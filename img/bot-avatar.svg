<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#40a7e3"/>
      <stop offset="100%" style="stop-color:#2b8bc4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Tile grid centered -->
  <g transform="translate(62, 90)">
    <!-- Row 1 - empty -->
    <rect x="0" y="0" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="82" y="0" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="164" y="0" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="246" y="0" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="328" y="0" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    
    <!-- Row 2 - highlighted -->
    <rect x="0" y="82" width="72" height="72" rx="8" fill="#fff"/>
    <rect x="82" y="82" width="72" height="72" rx="8" fill="#d4956b"/>
    <rect x="164" y="82" width="72" height="72" rx="8" fill="#fff"/>
    <rect x="246" y="82" width="72" height="72" rx="8" fill="#fff"/>
    <rect x="328" y="82" width="72" height="72" rx="8" fill="#fff"/>
    
    <!-- Row 3 - empty -->
    <rect x="0" y="164" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="82" y="164" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="164" y="164" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="246" y="164" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
    <rect x="328" y="164" width="72" height="72" rx="8" fill="#fff" opacity="0.3"/>
  </g>
  
  <!-- Title below -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#fff" letter-spacing="8">ВОРДЛИ</text>
  <text x="256" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff" opacity="0.8" letter-spacing="2">Угадай слово</text>
</svg>
